<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400, height=900">
<title>LiveFront v2.0 — 欢迎页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg-primary:    #0d0d14;
  --color-bg-secondary:  #12121c;
  --color-bg-tertiary:   #1a1a2e;
  --color-surface:       #1e1e32;
  --color-surface-hover: #252540;
  --color-surface-active:#2a2a4a;
  --color-border:        #2a2a3e;
  --color-border-light:  #3a3a52;
  --color-border-focus:  #4f8ff7;
  --color-accent:        #4f8ff7;
  --color-accent-hover:  #6ba3f9;
  --color-accent-subtle: #4f8ff720;
  --color-accent-secondary: #a78bfa;
  --color-text-primary:  #e8e8ed;
  --color-text-secondary:#9898a8;
  --color-text-tertiary: #6a6a7a;
  --color-text-inverse:  #ffffff;
  --color-success:       #34d399;
  --color-error:         #f87171;
  --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "Consolas", monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px; --space-lg: 16px; --space-xl: 24px; --space-2xl: 32px; --space-3xl: 48px;
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 12px rgba(79,143,247,0.15);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1400px; height: 900px; overflow: hidden;
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 14px; line-height: 1.5;
  display: flex; flex-direction: column;
}
/* ── Top bar ── */
.topbar {
  height: 40px; padding: 0 16px;
  background: var(--color-bg-secondary);
  border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 8px; }
.topbar-logo { font-size: 14px; font-weight: 600; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; }
.topbar-logo .icon { color: var(--color-accent); font-size: 16px; }
.topbar-right { display: flex; align-items: center; gap: 4px; }
.topbar-btn {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; color: var(--color-text-secondary);
  border-radius: var(--radius-sm); cursor: pointer; font-size: 14px;
  transition: background 100ms ease, color 100ms ease;
}
.topbar-btn:hover { background: var(--color-surface-hover); color: var(--color-text-primary); }

/* ── Main ── */
.main {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 48px; position: relative; overflow: hidden;
}
/* Subtle radial glow */
.main::before {
  content: ""; position: absolute; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(79,143,247,0.06) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}

.logo-section { text-align: center; position: relative; z-index: 1; }
.logo-icon {
  width: 72px; height: 72px; margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-secondary) 100%);
  border-radius: 18px; display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff; box-shadow: 0 8px 32px rgba(79,143,247,0.25);
}
.logo-title { font-size: 32px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; letter-spacing: -0.5px; }
.logo-slogan { font-size: 16px; color: var(--color-text-secondary); }

.actions { display: flex; gap: 20px; position: relative; z-index: 1; }
.action-card {
  width: 220px; padding: 28px 24px 24px;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  cursor: pointer; text-align: center;
  transition: border-color 200ms ease, box-shadow 200ms ease, transform 150ms ease;
}
.action-card:hover {
  border-color: var(--color-accent);
  box-shadow: var(--shadow-glow);
  transform: translateY(-2px);
}
.action-card .card-icon {
  width: 48px; height: 48px; margin: 0 auto 16px;
  background: var(--color-accent-subtle);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--color-accent);
}
.action-card:last-child .card-icon { background: rgba(167,139,250,0.12); color: var(--color-accent-secondary); }
.action-card .card-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; }
.action-card .card-desc  { font-size: 12px; color: var(--color-text-secondary); }

.recent-section { width: 480px; position: relative; z-index: 1; }
.recent-title { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.recent-list { display: flex; flex-direction: column; gap: 4px; }
.recent-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 150ms ease, border-color 150ms ease;
}
.recent-item:hover { background: var(--color-surface-hover); border-color: var(--color-border); }
.recent-item .ri-icon { font-size: 18px; color: var(--color-text-tertiary); }
.recent-item .ri-info { flex: 1; }
.recent-item .ri-name { font-size: 14px; color: var(--color-text-primary); font-weight: 500; }
.recent-item .ri-path { font-size: 11px; color: var(--color-text-tertiary); font-family: var(--font-mono); }

/* ── Status bar ── */
.statusbar {
  height: 24px; padding: 0 12px;
  background: var(--color-bg-secondary);
  border-top: 1px solid var(--color-border);
  display: flex; align-items: center; gap: 16px;
  font-size: 11px; color: var(--color-text-tertiary);
  flex-shrink: 0;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-tertiary); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><span class="icon">⬡</span> LiveFront</div>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn" title="设置">⚙</button>
    <button class="topbar-btn" title="最小化">─</button>
    <button class="topbar-btn" title="最大化">□</button>
    <button class="topbar-btn" title="关闭">✕</button>
  </div>
</div>

<!-- Main welcome -->
<div class="main">
  <div class="logo-section">
    <div class="logo-icon">LF</div>
    <div class="logo-title">LiveFront</div>
    <div class="logo-slogan">AI 是笔，LiveFront 是画板。</div>
  </div>

  <div class="actions">
    <div class="action-card">
      <div class="card-icon">✦</div>
      <div class="card-title">新建项目</div>
      <div class="card-desc">AI 从零生成</div>
    </div>
    <div class="action-card">
      <div class="card-icon">📂</div>
      <div class="card-title">打开项目</div>
      <div class="card-desc">打开已有文件</div>
    </div>
  </div>

  <div class="recent-section">
    <div class="recent-title">最近打开</div>
    <div class="recent-list">
      <div class="recent-item">
        <span class="ri-icon">📁</span>
        <div class="ri-info">
          <div class="ri-name">个人作品集</div>
          <div class="ri-path">C:\Users\admin\Projects\portfolio</div>
        </div>
      </div>
      <div class="recent-item">
        <span class="ri-icon">📁</span>
        <div class="ri-info">
          <div class="ri-name">公司官网</div>
          <div class="ri-path">C:\Users\admin\Projects\company-site</div>
        </div>
      </div>
      <div class="recent-item">
        <span class="ri-icon">📁</span>
        <div class="ri-info">
          <div class="ri-name">Landing Page 实验</div>
          <div class="ri-path">C:\Users\admin\Projects\landing-exp</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span class="status-dot"></span>
  <span>未打开项目</span>
</div>

</body>
</html>
