<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; font-src 'self'; connect-src 'self' http://127.0.0.1:*; frame-src http://127.0.0.1:*;"
  >
  <title>LiveFront</title>

  <!-- 基础样式 -->
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/modules.css">
  <link rel="stylesheet" href="./css/welcome.css">
</head>
<body>

  <!-- ── 顶部栏 ── -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">
        <span class="topbar-logo-icon">●</span>
        LiveFront
      </span>
      <nav class="topbar-menu">
        <span class="topbar-menu-item">文件</span>
        <span class="topbar-menu-item">编辑</span>
        <span class="topbar-menu-item">视图</span>
        <span class="topbar-menu-item">帮助</span>
      </nav>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" title="设置">⚙️</button>
    </div>
  </header>

  <!-- ── 欢迎页 ── -->
  <section class="welcome-page" id="welcome-page">
    <div class="welcome-main">
      <div class="welcome-logo-section">
        <div class="welcome-logo-icon">LF</div>
        <div class="welcome-logo-title">LiveFront</div>
        <div class="welcome-logo-slogan">AI 是笔，LiveFront 是画板。</div>
      </div>
      <div class="welcome-actions">
        <div class="welcome-action-card" id="btn-new-project">
          <div class="welcome-card-icon new-project-icon">✦</div>
          <div class="welcome-card-title">新建项目</div>
          <div class="welcome-card-desc">AI 从零生成</div>
        </div>
        <div class="welcome-action-card" id="btn-open-project">
          <div class="welcome-card-icon open-project-icon">📂</div>
          <div class="welcome-card-title">打开项目</div>
          <div class="welcome-card-desc">打开已有文件</div>
        </div>
      </div>
      <div class="welcome-recent-section" id="welcome-recent">
        <div class="welcome-recent-title">最近打开</div>
        <div class="welcome-recent-list" id="welcome-recent-list">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>
  </section>

  <!-- ── 主工作区 ── -->
  <main class="workspace" id="workspace" hidden>

    <!-- 左侧：文件树 -->
    <aside class="panel file-tree">
      <div class="panel-header">
        <span class="panel-title">文件</span>
        <div class="panel-actions">
          <button class="panel-btn" title="↻ 刷新">↻</button>
          <button class="panel-btn ft-new-btn" title="+ 新建文件">+</button>
        </div>
      </div>
      <div class="panel-content" id="filetree-container">
        <div class="empty-state">
          <span class="empty-state-icon">📁</span>
          <span class="empty-state-text">打开一个文件夹开始</span>
        </div>
      </div>
    </aside>

    <!-- 中间：预览区 -->
    <section class="center">
      <div class="preview-toolbar">
        <div class="device-btns">
          <button class="device-btn active" data-device="desktop" title="桌面">🗺️</button>
          <button class="device-btn" data-device="tablet" title="平板">📱</button>
          <button class="device-btn" data-device="mobile" title="手机">📱</button>
        </div>
        <span class="preview-url" id="preview-url">等待预览…</span>
        <div class="preview-actions">
          <button class="preview-btn" title="↻ 刷新预览">↻</button>
          <button class="preview-btn" title="↗ 在浏览器中打开">↗</button>
        </div>
      </div>
      <div class="preview-container" id="preview-container">
        <div class="empty-state">
          <span class="empty-state-icon">🎨</span>
          <span class="empty-state-text">预览区将在打开项目后显示</span>
        </div>
      </div>
    </section>

    <!-- 右侧：属性面板 / AI 对话 -->
    <aside class="panel right-panel">
      <div class="panel-tabs">
        <button class="panel-tab active">属性</button>
        <button class="panel-tab">AI</button>
      </div>
      <div class="panel-content" id="right-panel-content">
        <div class="empty-state">
          <span class="empty-state-icon">📌</span>
          <span class="empty-state-text">选中元素后显示属性</span>
        </div>
      </div>
    </aside>

  </main>

  <!-- ── 底部：拓扑图区域 ── -->
  <section class="topology-panel" id="topology-panel">
    <div class="topology-header">
      <span class="topology-title">页面拓扑</span>
      <button class="topology-toggle" id="topology-toggle" title="展开/折叠">▲</button>
    </div>
    <div class="topology-content" id="topology-content">
      <div class="empty-state">
        <span class="empty-state-icon">🕸️</span>
        <span class="empty-state-text">页面结构将在分析后显示</span>
      </div>
    </div>
  </section>

  <!-- ── 状态栏 ── -->
  <footer class="statusbar">
    <span class="status-dot"></span>
    <span id="status-project">未打开项目</span>
    <span id="status-encoding">UTF-8</span>
    <span id="status-info"></span>
  </footer>

  <!-- 渲染进程入口 -->
  <script type="module" src="./main.js"></script>

</body>
</html>
